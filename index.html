<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Michigan Old-Growth Forests Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
  :root { --green:#2f5d3a; --green-dark:#1f3d27; --bg:#f4f1ea; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; color:#222; }
  #app { display:flex; height:100vh; }
  #sidebar { width:340px; max-width:42%; background:var(--bg); border-right:1px solid #d9d3c4;
    display:flex; flex-direction:column; }
  #sidebar header { background:var(--green); color:#fff; padding:16px 18px; }
  #sidebar header h1 { margin:0; font-size:1.15rem; }
  #sidebar header p { margin:6px 0 0; font-size:.78rem; opacity:.9; line-height:1.35; }
  #count { padding:8px 18px; font-size:.78rem; color:#555; border-bottom:1px solid #d9d3c4; }
  #list { overflow-y:auto; flex:1; }
  .item { padding:11px 18px; border-bottom:1px solid #e6e1d4; cursor:pointer; }
  .item:hover { background:#e9e4d6; }
  .item.active { background:#dfe9da; border-left:4px solid var(--green); padding-left:14px; }
  .item .name { font-weight:600; font-size:.92rem; color:var(--green-dark); }
  .item .county { font-size:.76rem; color:#666; margin-top:2px; }
  #map { flex:1; }
  .popup-title { font-size:1rem; font-weight:700; color:var(--green-dark); margin-bottom:3px; }
  .popup-county { font-size:.78rem; color:#666; margin-bottom:6px; }
  .popup-desc { font-size:.82rem; line-height:1.4; max-height:160px; overflow-y:auto; }
  .popup-link { display:inline-block; margin-top:8px; font-size:.82rem; color:var(--green);
    font-weight:600; text-decoration:none; }
  .popup-link:hover { text-decoration:underline; }
  .leaflet-popup-content { width:260px !important; margin:12px 14px; }
  @media (max-width:640px) {
    #app { flex-direction:column; }
    #sidebar { width:100%; max-width:none; height:42%; }
    #map { height:58%; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <header>
      <h1>Michigan Old-Growth Forests</h1>
      <p>Forests in the Old-Growth Forest Network. Click a forest to locate it. Data: oldgrowthforest.net</p>
    </header>
    <div id="count"></div>
    <div id="list"></div>
  </div>
  <div id="map"></div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
const FORESTS = [{"name": "Aman Park", "lat": 42.97707, "lon": -85.83043, "county": "Ottawa County, MI", "url": "www.oldgrowthforest.net/mi-aman-park", "desc": "Aman Park is a 331-acre preserve six miles west of the city of Grand Rapids. The park contains a number of natural-surface trails through maturing second-growth forests including dry-mesic forests, southern mesic forests and floodplain forests along Sand Creek. Tree species present include northern red oak, eastern hemlock, red maple, American beech, black cherry, white oak and white pine, with silver maple and sycamore common in the lowlands."}, {"name": "Arcadia Dunes: The C.S. Mott Nature Preserve", "lat": 44.525316, "lon": -86.223871, "county": "Manistee County, MI", "url": "www.oldgrowthforest.net/mi-arcadia-dunes", "desc": "Protected in 2003, Arcadia Dunes is Grand-Traverse Regional Land Conservancy’s largest nature preserve, at 3927 acres, and includes 20 miles of trail that winds through dunes, forests and many other landscapes. Adjacent working farms have also been permanently protected, ensuring the longevity of this area’s rich agricultural heritage. The property’s incredibly diverse matrix of secondary hardwood forest, coastal dunes, and open fields provides a wide range of wildlife habitat. It also offers thoughtfully designed recreation opportunities and experiences, from hiking and birding to mountain biking and hunting."}, {"name": "Baker Woodlot & Rachana Rajendra Neotropical Migrant Bird Sanctuary, Michigan State University", "lat": 42.718306, "lon": -84.471722, "county": "Ingham County, MI", "url": "www.oldgrowthforest.net/mi-baker-woodlot-rachana-rajendra-neotropical-migrant-bird-sanctuary-michigan-state-university", "desc": "Baker Woodlot & Rachana Rajendra Neotropical Migrant Bird Sanctuary is a high-quality remnant of the forest that once grew before the campus was established. During its 165 years of preservation it has been subject to human disturbance, including road and railroad maintenance on its north and south borders, along with an assortment of management and research programs. Today, the woodlot is protected as a campus natural area and contains a diversity of tree species and ages, a shrub understory of elderberry and spicebush, and carpets of spring ephemerals. The largest trees are northern red oak, tulip poplar, and eastern cottonwood. American beech, black cherry, white oak, and sugar maple are other prominent components of the canopy."}, {"name": "Dolan Nature Sanctuary", "lat": 42.77714, "lon": -85.35881, "county": "Kent County, MI", "url": "www.oldgrowthforest.net/mi-dolan-nature-sanctuary", "desc": "The Dolan Nature Sanctuary is 127 acres in size and is largely comprised of wetlands, floodplain forest, mixed hardwoods, and abandoned agricultural fields, which have undergone restoration efforts toward an oak savanna. The property has frontage on two designated trout streams, the Coldwater River and Tyler Creek with the oldest forest located within the floodplain. The floodplain forest contains a series of oxbow ponds and wetland pools amongst the mature trees and is known for a population of Virginia bluebells which provide a striking blooming display in the spring. The forested corridor along the Coldwater River provides excellent habitat for neo-tropical migrants, forest birds, amphibians, and reptiles. The oak"}, {"name": "Duncan Park", "lat": 43.05329, "lon": -86.23145, "county": "Ottawa County, MI", "url": "www.oldgrowthforest.net/mi-duncan-park", "desc": "Duncan Park is a 42-acre natural area within the City of Grand Haven containing a rare old-growth hemlock-hardwood forest steeped in local history. Dominant trees present include eastern hemlock and American beech, with black cherry, northern red oak, and sugar maple throughout. An accessible trail provides all visitors with a chance to see magnificent hemlock trees and experience the living legacy of Robert and Martha Duncan."}, {"name": "Estivant Pines Nature Sanctuary", "lat": 47.44614, "lon": -87.87874, "county": "Keweenaw County, MI", "url": "www.oldgrowthforest.net/mi-estivant-pines-nature-sanctuary", "desc": "One of Michigan Nature Association’s most popular sanctuaries, Estivant Pines Nature Sanctuary was originally part of a 2,400-acre tract of land owned by Edward Estivant of Paris, who sold it to Calumet and Hecla Mining Company in 1947. The tract was sold to Universal Oil in 1968, and the area was threatened when Universal Oil cut down 300 acres of forest nearby and began plans for future logging. MNA led a three-year statewide fundraising campaign to purchase 200 acres of Estivant Pines from Universal Oil in 1973. Concerned citizens from the “Save The Pines” committee helped in the fundraising that led to this initial acquisition. Three additional acquisitions occurring between 1989 and 2019 have expanded the sanctuary to 570.5 acres, which protects one of the last old-growth white pine stands in Michigan."}, {"name": "Flower Creek Dunes Nature Preserve", "lat": 43.46482, "lon": -86.45863, "county": "Muskegon County, MI", "url": "www.oldgrowthforest.net/mi-flower-creek-dunes-nature-preserve", "desc": "Flower Creek Dunes Nature Preserve is located on the shoreline of Lake Michigan in the northwest part of Muskegon County, owned and cared for by the Land Conservancy of West Michigan. Established in 2012, the preserve protects outstanding views of Lake Michigan, sand and gravel beach, open dunes, interdunal wetlands, and 64-acres of mesic northern forest. The forest showcases high-quality, second-growth with abundant large dead trees and fallen logs, teaming with fungi, woodpeckers and other forest birds. Notable older hemlocks are present on site, and with careful stewardship from LCWM and community, it will continue to develop important old-growth characteristics. Tree species present include eastern hemlock, American beech, red oak, white pine, sugar maple, and other hardwoods."}, {"name": "Hartwick Pines State Park", "lat": 44.743487, "lon": -84.650259, "county": "Crawford County, MI", "url": "https://www.oldgrowthforest.net/mi-hartwick-pines-state-park", "desc": "This park includes one of the most-visited old-growth forests in the nation. Immediately behind the Michigan Forest Visitor Center is a paved 1.25 mile trail that leads through a 49 acre remnant of Michigan's original forest. The gentle rolling trail is suitable for all abilities. The forest is dominated by majestic white pines that inspire one to imagine what Michigan was like when it was first settled. In 1927, Karen Michelson Hartwick purchased over 8,000 acres of land here, which included 86 acres of old growth white pine. A short while later she donated the land to the State of Michigan as a memorial park to be named for her husband, who died in World War I. She also specified the forest should never be logged and that a log cabin (the Memorial Building) should be built to honor her husband, Maj. Edward Hartwick, as well as the lumberjacks that worked in the area during the White Pine Logging Era (1840-1910). Today,Hartwick Pines covers 9,672 acres and is one of the largest state parks in the Northern Lower Peninsula -- although very little of it is old-growth. A windstorm in 1940 reduced the old-growth pines area from 86 acres to 49 acres. The Hartwick Pines Logging Museum is open seasonally. Please check the website for hours of operation."}, {"name": "Humbug Marsh Unit - Detroit River International Wildlife Refuge", "lat": 42.114491, "lon": -83.187704, "county": "Wayne County, MI", "url": "www.oldgrowthforest.net/mi-humbug-marsh-unit", "desc": "The 405.16-acre Humbug Marsh Unit is a major part of the conservation crescent of the lower Detroit River - including Humbug mainland, Calf Island, Gibraltar Bay and Sugar Island - and a hotspot of biodiversity in an urban landscape. Sitting south of the Refuge Gateway, Humbug Marsh is mostly forested with some areas that were clear-cut in December 1998. In 2004, the property was purchased by the refuge after a group of local supporters stopped development that would have forever changed the face of the river and surrounding lands. The parcel represents the last mile of undeveloped shoreline along the U.S. mainland of the Detroit River and contains important habitat for many rare fish and wildlife species. Humbug Marsh was designated as Michigan's first Wetland of International Importance in 2010 by the Ramsar Convention on Wetlands."}, {"name": "Independence Oaks County Park", "lat": 42.781250439074, "lon": -83.3953507705025, "county": "Oakland County, MI", "url": "www.oldgrowthforest.net/mi-independance-oaks-county-park", "desc": "The sections designated within Independence Oaks consist of a large 229 acre section in the SE section of the park composed of a mosaic of southern hardwood swamp, hardwood-conifer swamp, and mesic southern forest, of which 14 acres apparently have never been logged and present a rare truly old growth condition, with the oldest trees being 300+ years in age (MNFI 2006). The dominant tree species varies across the area, but include tulip tree, red oak, yellow birch, white cedar, and white oak. This section shows no signs of plow or tillage with evidence of ancient tip-ups and a very high floristic quality and diversity."}, {"name": "Kehl Lake Natural Area", "lat": 45.169833, "lon": -85.595858, "county": "Leelanau County, MI", "url": "www.oldgrowthforest.net/mi-kehl-lake-natural-area", "desc": "Kehl Lake Natural Area is an important part of the network of preserved land serving as a wildlife corridor and refuge at the tip of the Leelanau Peninsula. The land surrounding this peaceful lake was used for generations by the Ottawa and Chippewa for seasonal gatherings and camps. The lake’s legging-like shape inspired the name Medahas-ah-eegan in the Anishinaabemowin language, or Leg Lake, which is printed on early maps of the region. In the 1860s, the Kehl family began to farm the Southern part of the property. Along the lakeshore today you will discover pristine water and a towering mixed forest with majestic old growth White Pine trees. The wetlands provide food and cover for wildlife, particularly birds, and contribute to the lake’s exceptional water quality."}, {"name": "Lepard Nature Preserve", "lat": 42.826068, "lon": -85.517232, "county": "Kent County, MI", "url": "www.oldgrowthforest.net/mi-lepard-nature-preserve", "desc": "Lepard Preserve is a 51 acre park which is primarily forested with maturing second-growth forests. Trees are likely 100-120 years old based on forests nearby. The forest type is Mesic Southern Forest (Maple-Beech) comprised primarily of sugar maple, northern red oak, American beech, including associates such as basswood, black cherry, American elm, red maple, and black walnut. This forest is significant for its relatively exceptional Floristic Quality Index and excellent display of spring ephemerals. This forest is also noticeably developing some old forest characteristics through the creation of small scale wind gaps, and contains above average large snags and coarse woody debris."}, {"name": "Love Creek Nature Center", "lat": 41.9515023240601, "lon": -86.2982935613351, "county": "Berrien County, MI", "url": "www.oldgrowthforest.net/mi-love-creek-nature-center", "desc": "Love Creek County Park encompasses approximately 200 acres, including an estimated 20–25 acres of high-quality, old-growth forest habitat. The forest is dominated by mature beech, maple, and red oak, providing a diverse and relatively undisturbed woodland ecosystem."}, {"name": "McCormick Wilderness - Ottawa National Forest", "lat": 46.649163, "lon": -88.05008, "county": "Marquette County, MI", "url": "www.oldgrowthforest.net/mi-mccormick-wilderness", "desc": "McCormick Wilderness encompasses approximately 16,850 acres. This large area encompasses diverse habitat locally known as the Peshekee highlands which is very hilly habitat with lakes, islands, rocky outcroppings marshes bogs and secluded old growth forest. Dominant tree species includes Eastern Hemlock, Red and White Pine, Aspen, Sugar Maple, Paper Birch and Basswood. Within the McCormick Wilderness is also the McCormick Research Natural Area (RNA) which is an experimental forest that allows research on the most unaltered area within the McCormick Wilderness. The area around and within the McCormick Wilderness experienced heavy logging prior to the wilderness designation in 1987. Therefore, limited stands of “old-growth” are currently present."}, {"name": "Misty Acres: The Borwell Preserve", "lat": 44.515018, "lon": -86.060299, "county": "Benzie County, MI", "url": "www.oldgrowthforest.net/mi-misty-acres-the-borwell-preserve", "desc": "Misty Acres: The Borwell Preserve is a 600-acre property that straddles the Benzie-Manistee County line. It includes more than 360 acres of forest, 6200 feet of the Betsie River and sensitive wetlands. Major tree species include sugar maple, hemlock, basswood, black cherry and white cedar. The property also includes a farm that is home to a small herd of sustainably managed Belted Galloway cattle. (The farm is open by appointment only)."}, {"name": "Newton Woods - Michigan State University Fred Russ Forest", "lat": 42.011467, "lon": -85.9621777, "county": "Cass County, MI", "url": "www.oldgrowthforest.net/mi-newton-woods", "desc": "The 80-acre Newton Woods is one of the last remaining old-growth, oak-mixed hardwood stands in Michigan's lower peninsula. Newton Woods exists within the Fred Russ Experimental Forest owned by Michigan State University. Minor management has occurred in the past, including thinnings in 1941 and 1956. 40 acres of the forest was designated as a National Natural Landmark in 1976."}, {"name": "Nordhouse Dunes Wilderness Area - Huron-Manistee National Forests", "lat": 44.087294, "lon": -86.444732, "county": "Mason County, MI", "url": "www.oldgrowthforest.net/mi-nordhouse-dunes-wilderness-area", "desc": "The 3,500 acre Nordhouse Dunes Wilderness Area was protected by Congress in 1987. Open Dunes and Great Lakes Barrens are found along nearly four miles of Lake Michigan shoreline. Some of the largest swaths of freshwater interdunal wetlands in the world are also present near Lake Michigan. Mixed hardwood forests of maple, beech, and hemlock are interspersed with oak and pine. Streams, small inland lakes, and wetlands are found in low areas between the forested backdunes. This Wilderness Area protects endangered species such as Piping plover, and Pitcher’s thistle and is home to wildlife like bear, deer, and porcupine. While the area was historically logged, the protections afforded by the Wilderness Act of 1964 will continue to allow the forests to grow old and recover their wild character."}, {"name": "Oden Island Nature Preserve", "lat": 45.413756, "lon": -84.818147, "county": "Emmet County, MI", "url": "www.oldgrowthforest.net/mi-oden-island-nature-preserve", "desc": "Oden Island Nature Preserve is a 50-acre forested natural area with nearly a mile of frontage on Crooked Lake. A couple of upland ridges occur along the middle of the preserve. These drier upland areas are unique and don’t fit a Michigan Natural Features Inventory classification very well, they are likely a variation of Mesic Northern Forest, but have characteristics of an inland Boreal Forest community type. There are a handful of emergent marsh pockets along the shoreline that comprise important nearshore aquatic habitats. The forests on the preserve are mature and contain many large trees, especially eastern hemlocks, white pine, and some large sugar maples. There have not been any timber harvests since the 1950’s, according to aerial imagery, and it has likely been much longer since any logging, and some trees might even predate the logging boom of the late 1800’s. Thus, portions of the forest in the Oden Island Nature Preserve approach old-growth forest characteristics."}, {"name": "Otto Nature Preserve", "lat": 43.604848, "lon": -86.518599, "county": "Oceana County, MI", "url": "www.oldgrowthforest.net/mi-otto-nature-preserve", "desc": "80 acres. Currently the property is a mature Beech-Maple climax forest moving toward \"old growth\" conditions. The oldest trees on the property are estimated to be 120-140 years old. The forest is uneven aged, with the most mature trees being American beech, sugar maple, Northern red oak, yellow birch, and Eastern hemlock. Evidence of old growth conditions include: forest floor with extensive \"pillows & cradles\" that indicate long term canopy disturbance, stilt rooted trees identify \"nurse\" seed bed structures, and large trees with very coarse bark and deformed canopies."}, {"name": "Pyatt Lake: The Bill Carls Nature Preserve", "lat": 44.903159, "lon": -85.525465, "county": "Grand Traverse County, MI", "url": "www.oldgrowthforest.net/mi-pyatt-lake", "desc": "Protected in 1992, Pyatt Lake represents not only an undisturbed landscape with unique habitat and geologic features but also the Conservancy’s first land preservation effort. Many diverse groups, from local artists to school children, came together to shield this land from the threat of impending development. Prior to Pyatt’s protection, the beauty and value of this property were recognized by both developers and conservationists. Luckily, the property had been identified as one of the most botanically diverse privately owned properties in Grand Traverse County and was one of three remaining examples of a “Wooded Dune and Swale Complex” habitat in northern Michigan. As a result, a compelling argument for Pyatt’s regional significance and preservation was successfully made. Over the years Pyatt Lake Preserve has been expanded eight times, bringing it to 159 acres."}, {"name": "Richmond Woods Nature Preserve", "lat": 43.696819, "lon": -85.800408, "county": "Newaygo County, MI", "url": "www.oldgrowthforest.net/mi-richmond-woods-nature-preserve", "desc": "Straddling both the Pere Marquette and White River watersheds, Richmond Woods Nature Preserve protects a pristine sphagnum bog and a high-quality sedge meadow wetland. Those wetlands protect water quality and are also home to the American Bittern, a bird in the heron family that is classified as special concern in Michigan. Red-headed woodpecker and red-shouldered hawk, two other special concern birds, inhabit the preserve’s forests. Adjacent to U.S. Forest Service land, Richmond Woods Nature Preserve helps protect a large expanse of Michigan’s iconic forest and wetland habitats."}, {"name": "Sand Point Nature Preserve", "lat": 43.900702, "lon": -83.326705, "county": "Huron County, MI", "url": "www.oldgrowthforest.net/mi-sand-point-nature-preserve", "desc": "220 total acres. Although none of the total acreage is technically old-growth, there are trees approaching or over a century old. The forest contains predominantly maples, oaks, black cherry, hemlock, and white pine."}, {"name": "Spirit of the Woods", "lat": 44.31074, "lon": -86.04874, "county": "Manistee County, MI", "url": "www.oldgrowthforest.net/mi-spirit-of-the-woods", "desc": "Approx 40 acres of mixed second growth. Includes: Ash, Aspen, Bass Wood, Beech, Birch, Cedar, Black Cherry, Dogwood, Elm, Hemlock, Iron Wood, Maple, Nine Bark, Oak, Pine. The property has thousands of feet of Bear Creek frontage."}, {"name": "Sturgeon River Gorge Wilderness - Ottawa National Forest", "lat": 46.633246, "lon": -88.706965, "county": "Houghton County, MI", "url": "www.oldgrowthforest.net/mi-sturgeon-river-gorge-wilderness", "desc": "Sturgeon River Gorge Wilderness is a 14,500-acre parcel of land that includes rocky outcrops, steep terrain, rushing rivers, marshes, bogs, wetlands and secluded old growth forests. Dominant species within the wilderness include Eastern Hemlock, Red and White Pine, Aspen, Sugar Maple, Paper Birch and Basswood. The wilderness also includes the Sturgeon River, a federally recognized Wild and Scenic stream. The area around and within the Sturgeon River Gorge Wilderness experienced heavy logging prior to the wilderness designation in 1987. Therefore, limited stands of old-growth are currently present."}, {"name": "Sylvania Wilderness - Ottawa National Forest", "lat": 46.239177, "lon": -89.329966, "county": "Gogebic County, MI", "url": "www.oldgrowthforest.net/mi-sylvania-wilderness", "desc": "Sylvania Wilderness encompasses approximately 18,400 acres. This large, primarily undisturbed area includes 34 named lakes, islands, rolling hills, marshes, bogs, wetlands and secluded old growth forests. Sylvania is a northern hardwood forests where dominant tree species include sugar maple, white pine, eastern hemlock, yellow birch, white birch and red pine. The specific acreage of “old-growth” within Sylvania is undocumented however, the majority of the 18,400 acres is relatively untouched old-growth forest."}, {"name": "Valley of the Giants - Pere Marquette State Forest", "lat": 44.6418929, "lon": -85.4381871, "county": "Grand Traverse County, MI", "url": "www.oldgrowthforest.net/mi-valley-of-the-giants", "desc": "Locally known as the Valley of the Giants, this impressive area of older forest is accessed via the North Country National Scenic Trail. The trail follows a transition of forest types from upland red oak, to unique natural stands of old eastern white pine and red pine, to eastern hemlock and white cedar along twenty-two creek. The Valley of the Giants is approximately 60 acres located within the Traverse City Forest Management Unit of the Pere Marquette State Forest."}, {"name": "Witherell Woods - Palmer Park", "lat": 42.42473, "lon": -83.11685, "county": "Wayne County, MI", "url": "www.oldgrowthforest.net/mi-witherel-woods-palmer-park", "desc": "The 70-acre Witherell Woods in Palmer Park is the largest old-growth forest in the Tri-County area, and one of only seven forests in the City of Detroit. Witherell Woods contains a true Oak-Beech Climax forest and some of the oaks exceeding 350 years in age were planted by Mother Nature herself. 3 distinct natural communities are present and over 100 different species of native plants, including several species of oak, maple and hickory. Improvements and changes made by People For Palmer Park, the Adopt-a-Park Community Partner with the City of Detroit, are mindful of this, and aim to ensure that the park will become self-sustaining, protected and a treasure to be enjoyed by all for generations to come."}];

const map = L.map('map', { scrollWheelZoom:true });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
}).addTo(map);

const greenIcon = new L.Icon({
  iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
  shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
  iconSize:[25,41], iconAnchor:[12,41], popupAnchor:[1,-34], shadowSize:[41,41]
});

const markers = [];
const bounds = [];

function popupHtml(f){
  let h = '<div class="popup-title">'+f.name+'</div>';
  if (f.county) h += '<div class="popup-county">'+f.county+'</div>';
  if (f.desc) h += '<div class="popup-desc">'+f.desc+'</div>';
  if (f.url) h += '<a class="popup-link" target="_blank" rel="noopener" href="'+f.url+'">Details &amp; directions &rarr;</a>';
  return h;
}

const listEl = document.getElementById('list');
FORESTS.forEach((f,i)=>{
  const m = L.marker([f.lat,f.lon],{icon:greenIcon}).addTo(map).bindPopup(popupHtml(f));
  markers.push(m);
  bounds.push([f.lat,f.lon]);

  const div = document.createElement('div');
  div.className='item';
  div.innerHTML='<div class="name">'+f.name+'</div>'+(f.county?'<div class="county">'+f.county+'</div>':'');
  div.onclick=()=>{
    map.setView([f.lat,f.lon], 12, {animate:true});
    m.openPopup();
    document.querySelectorAll('.item.active').forEach(e=>e.classList.remove('active'));
    div.classList.add('active');
  };
  listEl.appendChild(div);
});

map.fitBounds(bounds, { padding:[30,30] });
document.getElementById('count').textContent = FORESTS.length + ' forests in the Network';
</script>
</body>
</html>
